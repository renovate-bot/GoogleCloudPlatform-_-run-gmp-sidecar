name: run-gmp-sidecar
module: github.com/GoogleCloudPlatform/run-gmp-sidecar/run-gmp
display_name: Cloud Run GMP Sidecar
version: 1.8.0
description: "The Cloud Run GMP Sidecar build of the OTel Collector"
blurb: >-
  The run-gmp-sidecar is Google's recommended, serverless-friendly solution for seamlessly integrating Google Managed Service for Prometheus (GMP) into Cloud Run services. Leveraging Cloud Run's multi-container capabilities, it deploys a specialized OpenTelemetry Collector as a secondary "sidecar" container running directly alongside your main application.
opentelemetry_version: 0.148.0
opentelemetry_contrib_version: 0.148.0
opentelemetry_stable_version: 1.54.0
binary_name: rungmpcol
go_version: 1.26.1

replaces:
- from: github.com/mattn/go-ieproxy v0.0.9
  to: github.com/mattn/go-ieproxy v0.0.1
  reason: "Currently causes build issues on windows. Downgrading to previous version."
- from: github.com/prometheus/prometheus
  to: github.com/jefferbrecht/prometheus v0.0.0-20260325153347-5774096a9705
  reason: "Point to our fork of Prometheus at branch: feature/shutdownscrape_v0.54.1"
components:
  receivers:
  - otlp
  - prometheus

  processors:
  - filter
  - groupbyattrs
  - metricstransform
  - resourcedetection
  - resource
  - transform
  - batch
  - memorylimiter

  exporters:
  - debug
  - nop
  - otlp
  - otlphttp
  - file
  - googlecloud
  - googlemanagedprometheus

  extensions:
  - zpages

  providers:
  - env
  - file
  - yaml
